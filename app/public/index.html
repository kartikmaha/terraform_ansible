<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terraform + Ansible DevOps Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="container">
    <header>
      <h1>DevOps Infrastructure Dashboard</h1>
      <p>Terraform + Ansible Automation Control Panel</p>
    </header>

    <div class="grid">

      <div class="card">
        <h2>Terraform Pipeline</h2>
        <button onclick="runAction('terraform-init')">Init</button>
        <button onclick="runAction('terraform-plan')">Plan</button>
        <button onclick="runAction('terraform-apply')">Apply</button>
        <p id="terraform-status">Status: Idle</p>
      </div>

      <div class="card">
        <h2>Ansible Deployment</h2>
        <button onclick="runAction('ansible-run')">Run Playbook</button>
        <p id="ansible-status">Status: Idle</p>
      </div>

      <div class="card">
        <h2>Infrastructure Status</h2>
        <button onclick="fetchStatus()">Refresh</button>
        <pre id="infra-status">No data loaded</pre>
      </div>

      <div class="card">
        <h2>Deployment Logs</h2>
        <button onclick="clearLogs()">Clear</button>
        <pre id="logs"></pre>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
