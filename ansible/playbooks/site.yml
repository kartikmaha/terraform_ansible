---
# PLAY 1: Connection Verification
- name: Wait for EC2 SSH to be ready
  hosts: web_servers
  gather_facts: false
  tasks:
    - name: Ensure port 22 is reachable
      ansible.builtin.wait_for:
        port: 22
        host: "{{ inventory_hostname }}"
        search_regex: OpenSSH
        delay: 15
        timeout: 300
      delegate_to: localhost

# PLAY 2: Infrastructure Configuration
- name: Configure Web Server and Deploy App
  hosts: web_servers
  become: true
  gather_facts: true
  
  vars:
    app_port: 80 
    # Use your Docker Hub image here
    docker_image: "kartikmaha/terraform_anisble:latest"

  tasks:
    - name: Install Docker (Amazon Linux 2023)
      dnf:
        name: docker
        state: present
        update_cache: true

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: true

    - name: Reset connection to apply group changes
      ansible.builtin.meta: reset_connection

    - name: Pull and run Flask App
      community.docker.docker_container:
        name: flask_app
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        # Ensure your Flask app listens on 5000 inside the container
        published_ports:
          - "{{ app_port }}:5000"
