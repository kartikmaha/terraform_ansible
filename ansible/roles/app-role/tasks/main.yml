---
# We use 'command' instead of the 'yum' module to avoid the background setup crash
- name: Install required packages (Manual Yum)
  command: yum install -y docker git
  register: yum_out
  changed_when: "'Installed' in yum_out.stdout or 'Complete!' in yum_out.stdout"

- name: Start and enable Docker service
  service:
    name: docker
    state: started
    enabled: yes
  vars:
    # This prevents the service module from trying to gather facts
    ansible_pkg_mgr: yum

- name: Add ec2-user to docker group
  user:
    name: ec2-user
    groups: docker
    append: yes

- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user

- name: Copy application code
  copy:
    src: ../app/
    dest: "{{ app_dir }}/"
    owner: ec2-user
    group: ec2-user

- name: Build Docker image
  shell: |
    cd {{ app_dir }}
    docker build -t {{ docker_image }} .

- name: Stop existing container (if any)
  shell: |
    docker rm -f {{ container_name }} || true

- name: Run Docker container
  shell: |
    docker run -d -p {{ app_port }}:3000 --name {{ container_name }} {{ docker_image }}
