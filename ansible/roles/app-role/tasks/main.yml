---
- name: Add ec2-user to docker group (Raw)
  raw: sudo usermod -aG docker ec2-user
  changed_when: true

- name: Create app directory (Raw)
  raw: mkdir -p {{ app_dir }} && sudo chown ec2-user:ec2-user {{ app_dir }}
  changed_when: true

- name: Pull application code via Git (Raw)
  # This avoids the 'copy' module crash. 
  # We clean the dir first to ensure a fresh pull.
  raw: |
    rm -rf {{ app_dir }}/*
    git clone https://github.com/kartikmaha/terraform_anisble.git {{ app_dir }}/temp_repo
    cp -r {{ app_dir }}/temp_repo/app/* {{ app_dir }}/
    rm -rf {{ app_dir }}/temp_repo
  changed_when: true

- name: Build Docker image (Raw)
  raw: cd {{ app_dir }} && sudo docker build -t {{ docker_image }} .
  changed_when: true

- name: Stop existing container (Raw)
  raw: sudo docker rm -f {{ container_name }} || true
  changed_when: true

- name: Run Docker container (Raw)
  raw: sudo docker run -d -p {{ app_port }}:3000 --name {{ container_name }} {{ docker_image }}
  changed_when: true