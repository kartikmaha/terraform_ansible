name: Clean Deploy (Terraform + Ansible)

on:
  push:
    branches: [main, dev, stg]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TF_DIR: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Environment
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "ENV=prd" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF##*/}" == "stg" ]]; then
            echo "ENV=stg" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        id: tf
        run: |
          cd $TF_DIR
          terraform init
          terraform apply -auto-approve -var-file=envs/${{ env.ENV }}.tfvars
          echo "EC2_IP=$(terraform output -raw instance_public_ip)" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create Dynamic Inventory
        run: |
          mkdir -p ansible/inventories
          # Using the full path for the SSH key to avoid relative path confusion
          echo "[web_servers]" > ansible/inventories/${{ env.ENV }}
          echo "${{ env.EC2_IP }} ansible_user=ec2-user ansible_ssh_private_key_file=/home/runner/.ssh/id_rsa" >> ansible/inventories/${{ env.ENV }}

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          # This is the critical fix for the deserialization error
          ANSIBLE_MODULE_COMPRESSION: "none"
        run: |
          cd ansible
          # Pointing to the new playbooks/ directory
          ansible-playbook -i inventories/${{ env.ENV }} playbooks/site.yml
