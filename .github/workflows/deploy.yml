name: Clean Deploy (Terraform + Ansible)

on:
  push:
    branches:
      - main
      - dev
      - stg

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TF_DIR: terraform

    steps:

    # ----------------------------
    # CHECKOUT CODE
    # ----------------------------
    - name: Checkout Code
      uses: actions/checkout@v3

    # ----------------------------
    # SET ENV BASED ON BRANCH
    # ----------------------------
    - name: Set Environment
      run: |
        if [[ "${GITHUB_REF##*/}" == "main" ]]; then
          echo "ENV=prd" >> $GITHUB_ENV
        elif [[ "${GITHUB_REF##*/}" == "stg" ]]; then
          echo "ENV=stg" >> $GITHUB_ENV
        else
          echo "ENV=dev" >> $GITHUB_ENV
        fi

    # ----------------------------
    # AWS LOGIN
    # ----------------------------
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # ----------------------------
    # TERRAFORM SETUP
    # ----------------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # ----------------------------
    # TERRAFORM INIT
    # ----------------------------
    - name: Terraform Init
      run: |
        cd $TF_DIR
        terraform init

    # ----------------------------
    # TERRAFORM PLAN (GOOD PRACTICE)
    # ----------------------------
    - name: Terraform Plan
      run: |
        cd $TF_DIR
        terraform plan -var-file=envs/${ENV}.tfvars

    # ----------------------------
    # TERRAFORM APPLY
    # ----------------------------
    - name: Terraform Apply
      run: |
        cd $TF_DIR
        terraform apply -auto-approve -var-file=envs/${ENV}.tfvars

    # ----------------------------
    # INSTALL JQ
    # ----------------------------
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # ----------------------------
    # GET EC2 IP
    # ----------------------------
    - name: Get EC2 IP
      run: |
        cd $TF_DIR
        IP=$(terraform output -json instance_ip | jq -r '.')
        echo "EC2_IP=$IP" >> $GITHUB_ENV

    # ----------------------------
    # SETUP SSH KEY
    # ----------------------------
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/key.pem
        chmod 600 ~/.ssh/key.pem

    # ----------------------------
    # INSTALL ANSIBLE
    # ----------------------------
    - name: Install Ansible
      run: |
        sudo apt-get update
        sudo apt-get install -y ansible

    # ----------------------------
    # CREATE INVENTORY
    # ----------------------------
    - name: Create Inventory
      run: |
        mkdir -p ansible/inventories
        echo "[web]" > ansible/inventories/${ENV}
        echo "$EC2_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/key.pem ansible_python_interpreter=/usr/bin/python3" >> ansible/inventories/${ENV}
   
    # ----------------------------
    # WAIT FOR INSTANCE READINESS
    # ----------------------------
    - name: Wait for SSH
      run: |
        until ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -i ~/.ssh/key.pem ec2-user@$EC2_IP exit; do
          echo "Waiting for EC2 to be reachable..."
          sleep 20
        done
    # ----------------------------
    # RUN ANSIBLE
    # ----------------------------
    - name: Run Ansible Playbook
      run: |
        cd ansible
        ansible-playbook -i inventories/${ENV} playbooks/site.yml
